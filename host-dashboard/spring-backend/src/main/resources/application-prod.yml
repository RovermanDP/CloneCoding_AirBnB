spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  seed:
    enabled: false
  auth:
    jwt:
      secret: ${APP_JWT_SECRET:}
      issuer: ${APP_JWT_ISSUER:airnest-prod}

logging:
  level:
    org.hibernate.SQL: error
    org.hibernate.orm.jdbc.bind: error
