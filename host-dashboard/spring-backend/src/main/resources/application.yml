server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: airnest-backend
  profiles:
    default: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  seed:
    enabled: false
    host-email: ${APP_SEED_HOST_EMAIL:}
    host-password: ${APP_SEED_HOST_PASSWORD:}
    host-display-name: ${APP_SEED_HOST_DISPLAY_NAME:}
  auth:
    jwt:
      secret: ${APP_JWT_SECRET:}
      issuer: ${APP_JWT_ISSUER:airnest}
      access-token-ttl: ${APP_JWT_ACCESS_TOKEN_TTL:PT12H}

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
