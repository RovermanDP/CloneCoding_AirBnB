spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:airnest}
    username: ${DB_USERNAME:airnest_user}
    password: ${DB_PASSWORD:airnest_pass}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  seed:
    enabled: true
    host-email: ${APP_SEED_HOST_EMAIL:host@airnest.local}
    host-password: ${APP_SEED_HOST_PASSWORD:host1234!}
    host-display-name: ${APP_SEED_HOST_DISPLAY_NAME:Emiel Jacobs}
  auth:
    jwt:
      secret: ${APP_JWT_SECRET:airnest-local-jwt-secret-change-me-2026}
      issuer: ${APP_JWT_ISSUER:airnest-local}
