spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  auth:
    jwt:
      secret: ${APP_JWT_SECRET:}
      issuer: ${APP_JWT_ISSUER:airnest-dev}
